syntax = "proto3";

package movie;

message Movie {
  int32 id = 1;
  string title = 2;
  double rating = 3;
  int32 comments_count = 4;
  string quote = 5;
  string url = 6;
}

message ListMoviesRequest {
  int32 skip = 1;
  int32 limit = 2;
  optional double min_rating = 3;
  optional double max_rating = 4;
}
message ListMoviesResponse { repeated Movie items = 1; }

message GetMovieRequest { int32 movie_id = 1; }
message CreateMovieRequest {
  string title = 1;
  double rating = 2;
  int32 comments_count = 3;
  string quote = 4;
  string url = 5;
}
message UpdateMovieRequest {
  int32 movie_id = 1;
  optional string title = 2;
  optional double rating = 3;
  optional int32 comments_count = 4;
  optional string quote = 5;
  optional string url = 6;
}
message DeleteMovieRequest { int32 movie_id = 1; }

message DeleteMovieResponse { string message = 1; }
message ClearMoviesRequest {}
message ClearMoviesResponse { int32 deleted_count = 1; }

service MovieService {
  rpc ListMovies(ListMoviesRequest) returns (ListMoviesResponse);
  rpc GetMovie(GetMovieRequest) returns (Movie);
  rpc CreateMovie(CreateMovieRequest) returns (Movie);
  rpc UpdateMovie(UpdateMovieRequest) returns (Movie);
  rpc DeleteMovie(DeleteMovieRequest) returns (DeleteMovieResponse);
  rpc ClearMovies(ClearMoviesRequest) returns (ClearMoviesResponse);
}
